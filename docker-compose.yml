services:
  backend:
    build:
      context: ./backend
    env_file:
      - ./.env
    environment:
      DJANGO_SETTINGS_MODULE: core.settings
      PYTHONUNBUFFERED: "1"
    volumes:
      # Live Python code from the repo (otherwise only the image built at `docker compose build` runs — new API routes 404 until rebuild).
      - ./backend:/app
      - static_volume:/app/staticfiles
      # Bind mount so uploads are visible on the host and nginx serves the same files (avoids "orphan" named volumes).
      - ./media:/app/media
    expose:
      - "8000"
    command: >
      sh -c "python manage.py migrate
      && python manage.py collectstatic --noinput
      && gunicorn core.wsgi:application --bind 0.0.0.0:8000 --workers 2 --threads 1 --timeout 60 --max-requests 500 --max-requests-jitter 50 --access-logfile - --error-logfile -"

  nginx:
    build:
      context: ./nginx
    depends_on:
      - backend
    ports:
      - "8011:80"
    volumes:
      - static_volume:/var/www/static:ro
      - ./media:/var/www/media:ro
      - ./frontend:/var/www/frontend:ro
      # Use repo config at runtime so new locations apply without rebuilding the image.
      # After editing default.conf, reload nginx so workers pick it up: docker compose exec nginx nginx -s reload
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  static_volume:

