server {
  listen 80;
  server_name _;

  client_max_body_size 10m;

  # Collected by Django -> shared volume
  location /static/ {
    alias /var/www/static/;
    access_log off;
    expires 7d;
  }

  # User uploaded files (profile images)
  location /media/ {
    alias /var/www/media/;
    access_log off;
    expires 7d;
  }

  location = /login {
    root /var/www/frontend/templates;
    try_files /login.html =404;
  }

  # Frontend is served directly by nginx (no template rendering)
  location / {
    root /var/www/frontend/templates;
    try_files /index.html =404;
  }

  location /api/ {
    proxy_pass http://backend:8000;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /admin/ {
    proxy_pass http://backend:8000;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}

