server {
  listen 80;
  server_name _;

  client_max_body_size 10m;

  # Collected by Django -> shared volume
  location /static/ {
    alias /var/www/static/;
    access_log off;
    expires 7d;
  }

  # User uploaded files (profile images)
  location /media/ {
    alias /var/www/media/;
    access_log off;
    expires 7d;
  }

  location = /login {
    root /var/www/frontend/templates;
    try_files /auth/login.html =404;
  }

  location = /register {
    root /var/www/frontend/templates;
    try_files /auth/register.html =404;
  }

  location = /dashboard {
    root /var/www/frontend/templates;
    try_files /user/user-dashboard.html =404;
  }

  location = /book-live {
    root /var/www/frontend/templates;
    try_files /user/book-live.html =404;
  }

  location = /live-history {
    root /var/www/frontend/templates;
    try_files /user/live-history.html =404;
  }

  location = /enter-sales {
    root /var/www/frontend/templates;
    try_files /user/enter-sales.html =404;
  }

  location = /backoffice/dashboard {
    auth_request /api/backoffice/auth-check/;
    error_page 401 = @backoffice_login;
    error_page 403 = @backoffice_forbidden;

    root /var/www/frontend/templates;
    try_files /backoffice/dashboard.html =404;
  }

  location = /backoffice/users {
    auth_request /api/backoffice/auth-check/;
    error_page 401 = @backoffice_login;
    error_page 403 = @backoffice_forbidden;

    root /var/www/frontend/templates;
    try_files /backoffice/users.html =404;
  }

  location = /backoffice/brands/ {
    return 301 $scheme://$http_host/backoffice/brands;
  }

  location = /backoffice/brands {
    auth_request /api/backoffice/auth-check/;
    error_page 401 = @backoffice_login;
    error_page 403 = @backoffice_forbidden;

    root /var/www/frontend/templates;
    try_files /backoffice/brands.html =404;
  }

  location = /backoffice/bookings/ {
    return 301 $scheme://$http_host/backoffice/bookings;
  }

  location = /backoffice/bookings {
    auth_request /api/backoffice/auth-check/;
    error_page 401 = @backoffice_login;
    error_page 403 = @backoffice_forbidden;

    root /var/www/frontend/templates;
    try_files /backoffice/bookings.html =404;
  }

  location = /backoffice/calendar/ {
    return 301 $scheme://$http_host/backoffice/calendar;
  }

  location = /backoffice/calendar {
    auth_request /api/backoffice/auth-check/;
    error_page 401 = @backoffice_login;
    error_page 403 = @backoffice_forbidden;

    root /var/www/frontend/templates;
    try_files /backoffice/calendar.html =404;
  }

  location = /backoffice/channels/ {
    return 301 $scheme://$http_host/backoffice/channels;
  }

  location = /backoffice/channels {
    auth_request /api/backoffice/auth-check/;
    error_page 401 = @backoffice_login;
    error_page 403 = @backoffice_forbidden;

    root /var/www/frontend/templates;
    try_files /backoffice/channels.html =404;
  }

  location = /backoffice/user {
    return 302 $scheme://$http_host/backoffice/users;
  }

  location @backoffice_login {
    return 302 $scheme://$http_host/login;
  }

  location @backoffice_forbidden {
    return 403;
  }

  location = / {
    return 302 $scheme://$http_host/login;
  }

  location /api/ {
    proxy_pass http://backend:8000;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /admin/ {
    proxy_pass http://backend:8000;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}

