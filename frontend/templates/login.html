<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | Karmart Live Booking</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
  </head>

  <body class="min-h-screen bg-pink-50 text-slate-900">
    <main
      class="min-h-screen px-4 py-8 flex items-center justify-center"
      x-data="{ lineLoading: false, loginLoading: false }"
    >
      <section class="w-full max-w-md">
        <div class="mb-6 text-center">
          <div class="mx-auto mb-4 h-14 w-14 rounded-2xl bg-pink-200 text-pink-900 grid place-items-center text-xl font-bold shadow-sm">
            K
          </div>
          <h1 class="text-2xl font-bold tracking-tight">Karmart Live Booking</h1>
          <p class="mt-2 text-sm text-slate-600">
            เข้าสู่ระบบเพื่อจัดการตาราง Live Stream
          </p>
        </div>

        <div class="rounded-3xl border border-pink-100 bg-white/90 p-6 shadow-xl shadow-pink-100/70 backdrop-blur">
          <div class="mb-5">
            <h2 class="text-lg font-semibold">เข้าสู่ระบบ</h2>
            <p class="mt-1 text-sm text-slate-500">
              เข้าด้วย Username / Password หรือ LINE Login
            </p>
          </div>

          <form class="space-y-4" @submit.prevent="loginLoading = true; setTimeout(() => { loginLoading = false; alert('ยังไม่ได้เชื่อมต่อระบบ Login จริง'); }, 500)">
            <div>
              <label for="username" class="mb-1.5 block text-sm font-medium text-slate-700">Username</label>
              <input
                id="username"
                name="username"
                type="text"
                autocomplete="username"
                class="w-full rounded-2xl border border-pink-100 bg-pink-50/40 px-4 py-3 text-sm outline-none transition placeholder:text-slate-400 focus:border-pink-300 focus:bg-white focus:ring-4 focus:ring-pink-100"
                placeholder="username"
              />
            </div>

            <div>
              <label for="password" class="mb-1.5 block text-sm font-medium text-slate-700">Password</label>
              <input
                id="password"
                name="password"
                type="password"
                autocomplete="current-password"
                class="w-full rounded-2xl border border-pink-100 bg-pink-50/40 px-4 py-3 text-sm outline-none transition placeholder:text-slate-400 focus:border-pink-300 focus:bg-white focus:ring-4 focus:ring-pink-100"
                placeholder="password"
              />
            </div>

            <button
              type="submit"
              class="w-full rounded-2xl bg-pink-300 px-4 py-3 font-semibold text-pink-950 shadow-sm transition hover:bg-pink-400 focus:outline-none focus:ring-4 focus:ring-pink-100 disabled:cursor-not-allowed disabled:opacity-70"
              :disabled="loginLoading"
              x-text="loginLoading ? 'กำลังเข้าสู่ระบบ...' : 'เข้าสู่ระบบ'"
            ></button>
          </form>

          <div class="my-6 flex items-center gap-3">
            <div class="h-px flex-1 bg-pink-100"></div>
            <span class="text-xs text-slate-400">หรือ</span>
            <div class="h-px flex-1 bg-pink-100"></div>
          </div>

          <button
            type="button"
            class="flex w-full items-center justify-center gap-3 rounded-2xl bg-[#06C755] px-4 py-3 font-semibold text-white shadow-sm transition hover:bg-[#05b84f] focus:outline-none focus:ring-4 focus:ring-green-200 disabled:cursor-not-allowed disabled:opacity-70"
            :disabled="lineLoading"
            @click="lineLoading = true; setTimeout(() => { lineLoading = false; alert('ยังไม่ได้เชื่อมต่อ LINE OAuth จริง'); }, 500)"
          >
            <span class="grid h-7 w-7 place-items-center rounded-full bg-white text-[#06C755] text-sm font-black">L</span>
            <span x-text="lineLoading ? 'กำลังเชื่อมต่อ...' : 'เข้าสู่ระบบด้วย LINE'"></span>
          </button>

        </div>

        <p class="mt-6 text-center text-xs text-slate-500">
          สำหรับ production ต้องตั้งค่า LINE Channel ID, Channel Secret และ Callback URL ก่อนใช้งานจริง
        </p>
      </section>
    </main>
  </body>
</html>
