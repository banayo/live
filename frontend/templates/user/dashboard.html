<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#fce4ec" />
    <title>User Dashboard | Stitch Live Booking</title>

    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&family=Prompt:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
      rel="stylesheet"
    />

    <style>
      :root {
        --stitch-surface: #f9f9f9;
        --stitch-surface-container-lowest: #ffffff;
        --stitch-surface-container-low: #f3f3f3;
        --stitch-surface-container: #eeeeee;
        --stitch-on-surface: #1a1c1c;
        --stitch-on-surface-variant: #4d4447;
        --stitch-outline: #7f7478;
        --stitch-outline-variant: #d0c3c7;
        --stitch-primary: #6b5a60;
        --stitch-on-primary: #ffffff;
        --stitch-primary-container: #fce4ec;
        --stitch-on-primary-container: #76646b;
        --stitch-secondary-container: #d3e2ed;
        --stitch-on-secondary-container: #56656e;
        --stitch-tertiary-container: #e0ede1;
        --stitch-on-tertiary-container: #606c62;
        --stitch-error: #ba1a1a;
        --stitch-error-container: #ffdad6;
      }

      .material-symbols-outlined {
        font-variation-settings: "FILL" 0, "wght" 400, "GRAD" 0, "opsz" 24;
      }

      .soft-shadow {
        box-shadow: 0 20px 40px -15px rgba(107, 90, 96, 0.08);
      }

      .pink-gradient {
        background: linear-gradient(135deg, #fce4ec 0%, #f4dce4 100%);
      }

      .fab-gradient {
        background: linear-gradient(135deg, #6b5a60 0%, #524249 100%);
      }
    </style>

    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              heading: ["Prompt", "ui-sans-serif", "system-ui"],
              body: ["Kanit", "ui-sans-serif", "system-ui"],
            },
            spacing: {
              "container-margin": "20px",
              xs: "4px",
              sm: "8px",
              md: "16px",
              lg: "24px",
              xl: "32px",
              xxl: "48px",
            },
            boxShadow: {
              soft: "0 20px 40px -15px rgba(107, 90, 96, 0.08)",
            },
          },
        },
      };
    </script>
  </head>

  <body class="min-h-screen bg-[color:var(--stitch-surface)] pb-28 font-body text-[color:var(--stitch-on-surface)]">
    <div x-data="liveSalesDashboard()" x-init="init()" class="min-h-screen">
      <!-- TopAppBar -->
      <header class="sticky top-0 z-30 flex w-full items-center justify-between bg-[color:var(--stitch-surface)] px-container-margin py-md shadow-sm">
        <div class="flex items-center gap-md">
          <div class="h-10 w-10 overflow-hidden rounded-full border-2 border-[color:var(--stitch-primary-container)] bg-[color:var(--stitch-primary-container)]">
            <template x-if="user.profileImage">
              <img :src="user.profileImage" :alt="user.name" class="h-full w-full object-cover" />
            </template>
            <template x-if="!user.profileImage">
              <div class="grid h-full w-full place-items-center font-heading font-semibold text-[color:var(--stitch-primary)]" x-text="user.initial"></div>
            </template>
          </div>
          <div class="flex flex-col">
            <span class="font-heading text-xl font-semibold text-[color:var(--stitch-primary)]" x-text="user.name"></span>
            <span class="inline-block w-fit rounded-full bg-[color:var(--stitch-primary-container)] px-3 py-0.5 text-[10px] font-bold uppercase tracking-wider text-[color:var(--stitch-on-primary-container)]">
              User
            </span>
          </div>
        </div>

        <button
          type="button"
          class="flex h-10 w-10 items-center justify-center rounded-full bg-[color:var(--stitch-surface-container-lowest)] shadow-sm transition active:scale-95 hover:bg-[color:var(--stitch-primary-container)]"
          aria-label="Notifications"
        >
          <span class="material-symbols-outlined text-[color:var(--stitch-primary)]">notifications</span>
        </button>
      </header>

      <main class="mt-lg space-y-xl px-container-margin">
        <!-- Stat Cards -->
        <section class="grid grid-cols-2 gap-gutter">
          <div class="pink-gradient flex aspect-square flex-col justify-between rounded-3xl p-lg soft-shadow">
            <div class="mb-md flex h-10 w-10 items-center justify-center rounded-2xl bg-[color:var(--stitch-surface-container-lowest)]">
              <span class="material-symbols-outlined text-[color:var(--stitch-primary)]">payments</span>
            </div>
            <div>
              <p class="mb-xs text-xs font-bold uppercase tracking-wider text-[color:var(--stitch-on-primary-container)]">Total Sales</p>
              <h2 class="font-heading text-3xl font-semibold tracking-tight text-[color:var(--stitch-primary)]" x-text="formatMoney(totalSales())"></h2>
            </div>
          </div>

          <div class="pink-gradient flex aspect-square flex-col justify-between rounded-3xl p-lg soft-shadow">
            <div class="mb-md flex h-10 w-10 items-center justify-center rounded-2xl bg-[color:var(--stitch-surface-container-lowest)]">
              <span class="material-symbols-outlined text-[color:var(--stitch-primary)]">pending_actions</span>
            </div>
            <div>
              <p class="mb-xs text-xs font-bold uppercase tracking-wider text-[color:var(--stitch-on-primary-container)]">Pending</p>
              <h2 class="font-heading text-3xl font-semibold tracking-tight text-[color:var(--stitch-primary)]">
                <span x-text="pendingCount()"></span>
                <span class="text-sm font-normal">Sess.</span>
              </h2>
            </div>
          </div>
        </section>

        <!-- Weekly Schedule -->
        <section class="space-y-md">
          <div class="flex items-center justify-between">
            <h3 class="font-heading text-xl font-medium text-[color:var(--stitch-on-surface)]">Weekly Schedule</h3>
            <button
              type="button"
              class="flex items-center gap-xs rounded-full bg-[color:var(--stitch-surface-container)] px-md py-sm text-sm font-medium text-[color:var(--stitch-on-secondary-container)] transition hover:bg-[color:var(--stitch-secondary-container)]"
            >
              <span>This Week</span>
              <span class="material-symbols-outlined text-[18px]">expand_more</span>
            </button>
          </div>

          <div class="rounded-3xl bg-[color:var(--stitch-surface-container-lowest)] p-lg soft-shadow">
            <div class="mb-lg flex justify-between">
              <template x-for="day in weekDays" :key="day.date">
                <div class="flex flex-col items-center gap-sm">
                  <span class="text-sm font-medium" :class="day.active ? 'text-[color:var(--stitch-primary)] font-bold' : 'text-[color:var(--stitch-outline)]'" x-text="day.label"></span>
                  <div
                    class="flex h-8 w-8 items-center justify-center rounded-full text-sm font-bold"
                    :class="day.active ? 'bg-[color:var(--stitch-primary)] text-white' : ''"
                    x-text="day.date"
                  ></div>
                </div>
              </template>
            </div>

            <template x-if="error">
              <div class="rounded-3xl bg-[color:var(--stitch-error-container)] px-lg py-md text-sm text-[color:var(--stitch-error)]" x-text="error"></div>
            </template>

            <div class="space-y-sm" x-show="!error">
              <template x-for="session in todaySessions()" :key="session.id">
                <div
                  class="flex items-center justify-between rounded-2xl px-lg py-md"
                  :class="session.isCancelled ? 'bg-[color:var(--stitch-error-container)] text-[color:var(--stitch-error)]' : 'bg-[color:var(--stitch-on-surface)] text-[color:var(--stitch-surface)]'"
                >
                  <span class="font-medium" x-text="session.title"></span>
                  <span class="text-xs opacity-80" x-text="session.time"></span>
                </div>
              </template>

              <template x-if="todaySessions().length === 0">
                <div class="rounded-2xl bg-[color:var(--stitch-surface-container-low)] px-lg py-md text-center text-sm text-[color:var(--stitch-on-surface-variant)]">
                  ยังไม่มีตารางไลฟ์ในวันนี้
                </div>
              </template>
            </div>
          </div>
        </section>

        <!-- Upcoming Sessions -->
        <section class="space-y-md">
          <h3 class="font-heading text-xl font-medium text-[color:var(--stitch-on-surface)]">Upcoming Sessions</h3>
          <div class="space-y-md">
            <template x-for="session in upcomingSessions()" :key="session.id">
              <article class="flex items-center gap-md rounded-3xl bg-[color:var(--stitch-surface-container-lowest)] p-md soft-shadow">
                <div
                  class="flex h-16 w-16 flex-shrink-0 items-center justify-center overflow-hidden rounded-2xl"
                  :class="session.isCancelled ? 'grayscale opacity-70' : ''"
                  :style="thumbnailStyle(session)"
                >
                  <span class="material-symbols-outlined text-[color:var(--stitch-primary)]" x-text="session.icon"></span>
                </div>
                <div class="min-w-0 flex-grow" :class="session.isCancelled ? 'opacity-50' : ''">
                  <p class="mb-xs truncate text-base font-medium" x-text="session.title"></p>
                  <p class="text-sm text-[color:var(--stitch-outline)]" x-text="session.meta"></p>
                </div>
                <span
                  class="rounded-full px-3 py-1 text-[10px] font-bold uppercase"
                  :class="statusClass(session)"
                  x-text="session.statusLabel"
                ></span>
              </article>
            </template>

            <template x-if="!loading && upcomingSessions().length === 0">
              <div class="rounded-3xl bg-[color:var(--stitch-surface-container-lowest)] px-lg py-xl text-center soft-shadow">
                <p class="font-heading font-semibold">ยังไม่มี session ที่กำลังจะมาถึง</p>
                <p class="mt-1 text-sm text-[color:var(--stitch-on-surface-variant)]">รายการนี้แสดงเฉพาะข้อมูลของบัญชีคุณ</p>
              </div>
            </template>
          </div>
        </section>
      </main>

      <!-- Floating Action Button -->
      <button
        type="button"
        class="fab-gradient fixed bottom-28 right-6 z-40 flex h-16 items-center justify-center rounded-full px-6 text-white shadow-xl transition-transform duration-200 active:scale-95"
      >
        <span class="material-symbols-outlined text-[24px]">add</span>
        <span class="ml-1 mr-2 font-medium">Book Live</span>
      </button>

      <!-- BottomNavBar -->
      <nav class="fixed bottom-0 left-0 z-50 flex w-full items-center justify-around rounded-t-3xl bg-[color:var(--stitch-surface-container-lowest)] px-4 py-3 shadow-[0_-4px_20px_rgba(107,90,96,0.08)] md:hidden">
        <div class="flex scale-110 flex-col items-center justify-center rounded-2xl bg-[color:var(--stitch-primary-container)] p-2 text-[color:var(--stitch-on-primary-container)]">
          <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1">home</span>
          <span class="mt-1 text-[10px] font-bold uppercase tracking-wider">Home</span>
        </div>
        <div class="flex flex-col items-center justify-center rounded-2xl p-2 text-[color:var(--stitch-on-secondary-container)] transition hover:bg-[color:var(--stitch-secondary-container)]">
          <span class="material-symbols-outlined">event</span>
          <span class="mt-1 text-[10px] font-bold uppercase tracking-wider">ตารางงาน</span>
        </div>
        <div class="flex flex-col items-center justify-center rounded-2xl p-2 text-[color:var(--stitch-on-secondary-container)] transition hover:bg-[color:var(--stitch-secondary-container)]">
          <span class="material-symbols-outlined">videocam</span>
          <span class="mt-1 text-[10px] font-bold uppercase tracking-wider">Live</span>
        </div>
      </nav>
    </div>

    <script>
      function liveSalesDashboard() {
        return {
          loading: false,
          error: "",
          user: {
            name: "User",
            initial: "U",
            profileImage: "",
          },
          sessions: [],
          weekDays: [
            { label: "Mon", date: "12", active: false },
            { label: "Tue", date: "13", active: false },
            { label: "Wed", date: "14", active: true },
            { label: "Thu", date: "15", active: false },
            { label: "Fri", date: "16", active: false },
          ],

          async init() {
            await Promise.all([this.loadMe(), this.loadSchedules()]);
          },

          async loadMe() {
            try {
              const res = await fetch("/api/auth/me/", {
                credentials: "same-origin",
                headers: { Accept: "application/json" },
              });
              if (res.status === 401 || res.status === 403) {
                window.location.href = "/login";
                return;
              }
              const data = await res.json();
              if (!data.authenticated) {
                window.location.href = "/login";
                return;
              }
              const username = data.user && data.user.username ? String(data.user.username) : "User";
              this.user.name = username;
              this.user.initial = username.charAt(0).toUpperCase();
            } catch (_) {
              this.user.name = "User";
              this.user.initial = "U";
            }
          },

          async loadSchedules() {
            this.loading = true;
            this.error = "";
            try {
              const now = new Date();
              const start = new Date(now);
              start.setDate(now.getDate() - 3);
              const end = new Date(now);
              end.setDate(now.getDate() + 14);
              const params = new URLSearchParams({
                start: start.toISOString(),
                end: end.toISOString(),
              });
              const res = await fetch(`/api/schedules/?${params.toString()}`, {
                credentials: "same-origin",
                headers: { Accept: "application/json" },
              });
              if (res.status === 401 || res.status === 403) {
                window.location.href = "/login";
                return;
              }
              if (!res.ok) throw new Error("load_failed");
              const rows = await res.json();
              this.sessions = Array.isArray(rows) ? rows.map((row) => this.mapSession(row)) : [];
            } catch (_) {
              this.error = "โหลดตารางไลฟ์ไม่สำเร็จ กรุณาลองใหม่";
              this.sessions = [];
            } finally {
              this.loading = false;
            }
          },

          mapSession(row) {
            const start = row.start ? new Date(row.start) : null;
            const end = row.end ? new Date(row.end) : null;
            const extended = row.extendedProps || {};
            const isCancelled = Boolean(extended.isCancelled);
            const isVerified = Boolean(extended.isVerified);
            return {
              id: row.id,
              title: row.title || "Live Session",
              start,
              end,
              time: this.timeRange(start, end),
              meta: `${this.dateLabel(start)} • ${this.timeRange(start, end)}`,
              isCancelled,
              isVerified,
              statusLabel: isCancelled ? "Cancelled" : isVerified ? "Verified" : "Pending",
              icon: isCancelled ? "videocam_off" : "videocam",
            };
          },

          totalSales() {
            return 0;
          },

          pendingCount() {
            return this.sessions.filter((s) => !s.isVerified && !s.isCancelled).length;
          },

          todaySessions() {
            const today = new Date();
            return this.sessions
              .filter((s) => s.start && this.sameDay(s.start, today))
              .slice(0, 2);
          },

          upcomingSessions() {
            const now = new Date();
            return this.sessions
              .filter((s) => !s.start || s.start >= now || this.sameDay(s.start, now))
              .slice(0, 6);
          },

          sameDay(a, b) {
            return a.getFullYear() === b.getFullYear()
              && a.getMonth() === b.getMonth()
              && a.getDate() === b.getDate();
          },

          timeRange(start, end) {
            if (!start) return "--:--";
            const fmt = new Intl.DateTimeFormat("th-TH", { hour: "2-digit", minute: "2-digit" });
            return end ? `${fmt.format(start)} - ${fmt.format(end)}` : fmt.format(start);
          },

          dateLabel(date) {
            if (!date) return "ไม่ระบุวัน";
            const today = new Date();
            const tomorrow = new Date();
            tomorrow.setDate(today.getDate() + 1);
            if (this.sameDay(date, today)) return "วันนี้";
            if (this.sameDay(date, tomorrow)) return "พรุ่งนี้";
            return new Intl.DateTimeFormat("th-TH", { day: "2-digit", month: "short" }).format(date);
          },

          formatMoney(amount) {
            return new Intl.NumberFormat("th-TH", {
              style: "currency",
              currency: "THB",
              maximumFractionDigits: 0,
            }).format(amount);
          },

          statusClass(session) {
            if (session.isCancelled) return "bg-red-100 text-red-700";
            if (session.isVerified) return "bg-green-100 text-green-700";
            return "bg-yellow-100 text-yellow-700";
          },

          thumbnailStyle(session) {
            if (session.isCancelled) return "background: var(--stitch-surface-container-low)";
            if (session.isVerified) return "background: var(--stitch-tertiary-container)";
            return "background: var(--stitch-primary-container)";
          },
        };
      }
    </script>
  </body>
</html>
