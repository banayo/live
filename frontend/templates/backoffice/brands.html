<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#fce4ec" />
    <title>จัดการแบรนด์ | Stitch Live Booking</title>

    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&family=Prompt:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
      rel="stylesheet"
    />

    <style>
      :root {
        --stitch-surface: #f9f9f9;
        --stitch-surface-container-lowest: #ffffff;
        --stitch-surface-container-low: #f3f3f3;
        --stitch-surface-container: #eeeeee;
        --stitch-surface-container-high: #e8e8e8;
        --stitch-on-surface: #1a1c1c;
        --stitch-on-surface-variant: #4d4447;
        --stitch-outline-variant: #d0c3c7;
        --stitch-primary: #6b5a60;
        --stitch-primary-fixed: #f4dce4;
        --stitch-primary-container: #fce4ec;
        --stitch-on-primary-container: #76646b;
        --stitch-secondary-container: #d3e2ed;
        --stitch-on-secondary-container: #56656e;
        --stitch-tertiary-container: #e0ede1;
        --stitch-on-tertiary-container: #606c62;
        --stitch-error-container: #ffdad6;
        --stitch-on-error-container: #93000a;
      }

      .material-symbols-outlined {
        font-variation-settings: "FILL" 0, "wght" 400, "GRAD" 0, "opsz" 24;
      }

      .soft-shadow {
        box-shadow: 0 20px 40px -15px rgba(107, 90, 96, 0.08);
      }

      .side-shadow {
        box-shadow: 20px 0 40px -15px rgba(107, 90, 96, 0.05);
      }

      .bo-nav-mobilescroll {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
      .bo-nav-mobilescroll::-webkit-scrollbar {
        display: none;
      }
    </style>

    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              heading: ["Prompt", "ui-sans-serif", "system-ui"],
              body: ["Kanit", "ui-sans-serif", "system-ui"],
            },
            spacing: {
              xs: "4px",
              sm: "8px",
              md: "16px",
              lg: "24px",
              xl: "32px",
              xxl: "48px",
              gutter: "16px",
            },
          },
        },
      };
    </script>
  </head>

  <body class="min-h-screen bg-[color:var(--stitch-surface)] font-body text-[color:var(--stitch-on-surface)]">
    <div x-data="brandManagement()" x-init="init()">
      <div
        class="pointer-events-none fixed left-1/2 top-lg z-[60] w-full max-w-md -translate-x-1/2 px-lg"
        x-show="toast.show"
        x-transition.opacity.duration.150ms
        style="display: none"
      >
        <div
          class="pointer-events-auto flex items-start justify-between gap-md rounded-3xl border bg-white px-md py-md soft-shadow"
          :class="toast.tone === 'ok' ? 'border-[color:var(--stitch-tertiary-container)]' : 'border-[color:var(--stitch-error-container)]'"
        >
          <div class="min-w-0">
            <p class="text-sm font-bold text-[color:var(--stitch-primary)]" x-text="toast.tone === 'ok' ? 'สำเร็จ' : 'เกิดข้อผิดพลาด'"></p>
            <p class="mt-xs text-sm text-[color:var(--stitch-on-surface-variant)]" x-text="toast.message"></p>
          </div>
          <button
            class="grid h-9 w-9 place-items-center rounded-full bg-[color:var(--stitch-surface-container-low)] transition hover:bg-[color:var(--stitch-primary-container)] active:scale-95"
            type="button"
            @click="toast.show = false"
          >
            <span class="material-symbols-outlined text-sm">close</span>
          </button>
        </div>
      </div>

      <aside class="fixed left-0 top-0 z-50 hidden h-screen w-64 flex-col gap-xl rounded-r-3xl bg-[color:var(--stitch-surface-container-lowest)] p-lg side-shadow lg:flex">
        <div class="flex items-center gap-md">
          <div class="flex h-10 w-10 items-center justify-center rounded-2xl bg-[color:var(--stitch-primary-container)]">
            <span class="material-symbols-outlined text-[color:var(--stitch-primary)]" style="font-variation-settings: 'FILL' 1">hub</span>
          </div>
          <div>
            <h1 class="font-heading text-xl font-bold text-[color:var(--stitch-primary)]">Kamrats live</h1>
          </div>
        </div>

        <nav class="flex flex-grow flex-col gap-sm" aria-label="เมนูหลัก">
          <a class="flex min-w-0 items-center gap-md rounded-full px-lg py-md font-heading text-[0.8125rem] font-semibold tracking-wide text-[color:var(--stitch-on-surface-variant)] transition duration-150 hover:translate-x-0.5 hover:bg-[color:var(--stitch-surface-container-high)] focus:outline-none focus-visible:ring-2 focus-visible:ring-[color:var(--stitch-primary-container)] focus-visible:ring-offset-2 focus-visible:ring-offset-[color:var(--stitch-surface-container-lowest)]" href="/backoffice/dashboard">
            <span class="material-symbols-outlined shrink-0">dashboard</span>
            <span class="truncate">แดชบอร์ด</span>
          </a>
          <a class="flex min-w-0 items-center gap-md rounded-full px-lg py-md font-heading text-[0.8125rem] font-semibold tracking-wide text-[color:var(--stitch-on-surface-variant)] transition duration-150 hover:translate-x-0.5 hover:bg-[color:var(--stitch-surface-container-high)] focus:outline-none focus-visible:ring-2 focus-visible:ring-[color:var(--stitch-primary-container)] focus-visible:ring-offset-2 focus-visible:ring-offset-[color:var(--stitch-surface-container-lowest)]" href="/backoffice/users">
            <span class="material-symbols-outlined shrink-0">group</span>
            <span class="truncate">ผู้ใช้</span>
          </a>
          <a class="flex min-w-0 items-center gap-md rounded-full px-lg py-md font-heading text-[0.8125rem] font-semibold tracking-wide text-[color:var(--stitch-on-surface-variant)] transition duration-150 hover:translate-x-0.5 hover:bg-[color:var(--stitch-surface-container-high)] focus:outline-none focus-visible:ring-2 focus-visible:ring-[color:var(--stitch-primary-container)] focus-visible:ring-offset-2 focus-visible:ring-offset-[color:var(--stitch-surface-container-lowest)]" href="/backoffice/calendar">
            <span class="material-symbols-outlined shrink-0">calendar_today</span>
            <span class="truncate">ปฏิทิน</span>
          </a>
          <a class="flex min-w-0 items-center gap-md rounded-full px-lg py-md font-heading text-[0.8125rem] font-semibold tracking-wide text-[color:var(--stitch-on-surface-variant)] transition duration-150 hover:translate-x-0.5 hover:bg-[color:var(--stitch-surface-container-high)] focus:outline-none focus-visible:ring-2 focus-visible:ring-[color:var(--stitch-primary-container)] focus-visible:ring-offset-2 focus-visible:ring-offset-[color:var(--stitch-surface-container-lowest)]" href="/backoffice/bookings">
            <span class="material-symbols-outlined shrink-0">receipt_long</span>
            <span class="truncate">ใบจอง</span>
          </a>
          <a class="flex min-w-0 items-center gap-md rounded-full bg-[color:var(--stitch-primary-container)] px-lg py-md font-heading text-[0.8125rem] font-semibold tracking-wide text-[color:var(--stitch-on-primary-container)] shadow-[0_10px_28px_-12px_rgba(107,90,96,0.45)] focus:outline-none focus-visible:ring-2 focus-visible:ring-[color:var(--stitch-primary)]/35 focus-visible:ring-offset-2 focus-visible:ring-offset-[color:var(--stitch-surface-container-lowest)]" href="/backoffice/brands" aria-current="page">
            <span class="material-symbols-outlined shrink-0" style="font-variation-settings: 'FILL' 1">stars</span>
            <span class="truncate">แบรนด์</span>
          </a>
          <a class="flex min-w-0 items-center gap-md rounded-full px-lg py-md font-heading text-[0.8125rem] font-semibold tracking-wide text-[color:var(--stitch-on-surface-variant)] transition duration-150 hover:translate-x-0.5 hover:bg-[color:var(--stitch-surface-container-high)] focus:outline-none focus-visible:ring-2 focus-visible:ring-[color:var(--stitch-primary-container)] focus-visible:ring-offset-2 focus-visible:ring-offset-[color:var(--stitch-surface-container-lowest)]" href="/backoffice/channels">
            <span class="material-symbols-outlined shrink-0">podcasts</span>
            <span class="truncate">ช่องทาง</span>
          </a>
        </nav>
      </aside>

      <main class="min-h-screen lg:ml-64">
        <nav class="bo-nav-mobilescroll lg:hidden sticky top-0 z-[45] flex gap-xs overflow-x-auto border-b border-[color:var(--stitch-outline-variant)]/25 bg-[color:var(--stitch-surface)]/98 px-md py-sm backdrop-blur-md" aria-label="เมนูหลัก">
          <a class="shrink-0 rounded-full bg-[color:var(--stitch-surface-container-low)] px-md py-2 font-heading text-[11px] font-semibold text-[color:var(--stitch-on-surface-variant)] transition hover:bg-[color:var(--stitch-surface-container-high)]" href="/backoffice/dashboard">แดชบอร์ด</a>
          <a class="shrink-0 rounded-full bg-[color:var(--stitch-surface-container-low)] px-md py-2 font-heading text-[11px] font-semibold text-[color:var(--stitch-on-surface-variant)] transition hover:bg-[color:var(--stitch-surface-container-high)]" href="/backoffice/users">ผู้ใช้</a>
          <a class="shrink-0 rounded-full bg-[color:var(--stitch-surface-container-low)] px-md py-2 font-heading text-[11px] font-semibold text-[color:var(--stitch-on-surface-variant)] transition hover:bg-[color:var(--stitch-surface-container-high)]" href="/backoffice/calendar">ปฏิทิน</a>
          <a class="shrink-0 rounded-full bg-[color:var(--stitch-surface-container-low)] px-md py-2 font-heading text-[11px] font-semibold text-[color:var(--stitch-on-surface-variant)] transition hover:bg-[color:var(--stitch-surface-container-high)]" href="/backoffice/bookings">ใบจอง</a>
          <a class="shrink-0 rounded-full bg-[color:var(--stitch-primary-container)] px-md py-2 font-heading text-[11px] font-semibold text-[color:var(--stitch-on-primary-container)] shadow-sm" href="/backoffice/brands" aria-current="page">แบรนด์</a>
          <a class="shrink-0 rounded-full bg-[color:var(--stitch-surface-container-low)] px-md py-2 font-heading text-[11px] font-semibold text-[color:var(--stitch-on-surface-variant)] transition hover:bg-[color:var(--stitch-surface-container-high)]" href="/backoffice/channels">ช่องทาง</a>
        </nav>
        <header class="sticky top-0 z-40 flex w-full items-center justify-between gap-lg bg-[color:var(--stitch-surface)] px-lg py-md shadow-[0_20px_40px_-15px_rgba(107,90,96,0.08)]">
          <div class="relative w-full max-w-xl">
            <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-[color:var(--stitch-on-surface-variant)]">search</span>
            <input
              class="w-full rounded-full border-none bg-[color:var(--stitch-surface-container-low)] py-2.5 pl-12 pr-6 text-sm transition focus:ring-2 focus:ring-[color:var(--stitch-primary-container)]"
              placeholder="ค้นหาชื่อแบรนด์..."
              type="text"
              x-model.debounce.200ms="query"
            />
          </div>
        </header>

        <div class="space-y-xl p-lg">
          <section class="flex flex-col justify-between gap-md xl:flex-row xl:items-end">
            <div>
              <p class="mb-xs inline-flex rounded-full bg-[color:var(--stitch-primary-container)] px-md py-1 text-xs font-bold uppercase tracking-wider text-[color:var(--stitch-on-primary-container)]">
                Brand Management
              </p>
              <h2 class="font-heading text-3xl font-semibold tracking-tight text-[color:var(--stitch-primary)]">จัดการแบรนด์</h2>
              <p class="mt-sm max-w-2xl text-sm leading-relaxed text-[color:var(--stitch-on-surface-variant)]">
                เพิ่ม แก้ไข และเปิด/ปิดการใช้งานแบรนด์ในระบบจองไลฟ์
              </p>
            </div>
            <button
              class="inline-flex items-center gap-xs rounded-full bg-[color:var(--stitch-primary)] px-md py-sm text-sm font-bold text-white shadow-lg transition hover:opacity-95 active:scale-95"
              type="button"
              @click="openCreate()"
            >
              <span class="material-symbols-outlined text-sm">add</span>
              เพิ่มแบรนด์
            </button>
          </section>

          <section class="grid gap-gutter sm:grid-cols-2 xl:grid-cols-4">
            <article class="rounded-3xl bg-[color:var(--stitch-surface-container-lowest)] p-lg soft-shadow">
              <p class="mb-xs text-xs font-bold uppercase tracking-wider text-[color:var(--stitch-on-surface-variant)]">ทั้งหมด</p>
              <h3 class="font-heading text-3xl font-semibold text-[color:var(--stitch-primary)]" x-text="brands.length"></h3>
            </article>
            <article class="rounded-3xl bg-[color:var(--stitch-surface-container-lowest)] p-lg soft-shadow">
              <p class="mb-xs text-xs font-bold uppercase tracking-wider text-[color:var(--stitch-on-surface-variant)]">เปิดใช้งาน</p>
              <h3 class="font-heading text-3xl font-semibold text-[color:var(--stitch-on-tertiary-container)]" x-text="brands.filter((b) => b.is_active).length"></h3>
            </article>
            <article class="rounded-3xl bg-[color:var(--stitch-surface-container-lowest)] p-lg soft-shadow">
              <p class="mb-xs text-xs font-bold uppercase tracking-wider text-[color:var(--stitch-on-surface-variant)]">ปิดใช้งาน</p>
              <h3 class="font-heading text-3xl font-semibold text-[color:var(--stitch-on-error-container)]" x-text="brands.filter((b) => !b.is_active).length"></h3>
            </article>
            <article class="rounded-3xl bg-[color:var(--stitch-secondary-container)]/40 p-lg soft-shadow">
              <p class="mb-xs text-xs font-bold uppercase tracking-wider text-[color:var(--stitch-on-secondary-container)]">แสดงผล</p>
              <h3 class="font-heading text-3xl font-semibold text-[color:var(--stitch-on-secondary-container)]" x-text="filteredBrands().length"></h3>
            </article>
          </section>

          <section class="grid gap-gutter sm:grid-cols-2 lg:grid-cols-3">
            <template x-for="brand in filteredBrands()" :key="brand.id">
              <article class="flex flex-col gap-md rounded-3xl bg-[color:var(--stitch-surface-container-lowest)] p-lg soft-shadow transition hover:bg-[color:var(--stitch-primary-container)]/15">
                <div class="flex items-start justify-between gap-sm">
                  <div class="grid h-14 w-14 shrink-0 place-items-center rounded-2xl bg-[color:var(--stitch-primary-container)]">
                    <span class="material-symbols-outlined text-[color:var(--stitch-primary)]">storefront</span>
                  </div>
                  <span
                    class="rounded-full px-sm py-1 text-[11px] font-bold"
                    :class="brand.is_active ? 'bg-[color:var(--stitch-tertiary-container)] text-[color:var(--stitch-on-tertiary-container)]' : 'bg-[color:var(--stitch-surface-container-low)] text-[color:var(--stitch-on-surface-variant)]'"
                    x-text="brand.is_active ? 'ใช้งาน' : 'ปิด'"
                  ></span>
                </div>
                <div class="min-w-0 flex-1">
                  <h3 class="font-heading text-lg font-semibold text-[color:var(--stitch-primary)]" x-text="brand.name"></h3>
                  <p class="mt-xs text-xs text-[color:var(--stitch-on-surface-variant)]">แบรนด์ในระบบ</p>
                </div>
                <button
                  class="w-full rounded-full bg-[color:var(--stitch-primary-container)] py-2 text-sm font-bold text-[color:var(--stitch-primary)] transition hover:opacity-90 active:scale-95"
                  type="button"
                  @click="openEdit(brand)"
                >
                  แก้ไข
                </button>
              </article>
            </template>
          </section>
        </div>
      </main>

      <div
        class="fixed inset-0 z-50 flex items-center justify-center bg-[#1a1c1c]/30 p-lg"
        x-show="modalOpen"
        x-transition.opacity.duration.150ms
        style="display: none"
      >
        <div
          class="flex w-full max-w-md max-h-[90vh] min-h-0 flex-col overflow-hidden rounded-3xl bg-white p-lg soft-shadow"
          @click.outside="closeModal()"
          x-transition.scale.origin.center.duration.150ms
        >
          <div class="flex items-center justify-between gap-md pb-md">
            <h3 class="font-heading text-xl font-semibold text-[color:var(--stitch-primary)]" x-text="modalMode === 'create' ? 'เพิ่มแบรนด์' : 'แก้ไขแบรนด์'"></h3>
            <button class="grid h-10 w-10 place-items-center rounded-full bg-[color:var(--stitch-surface-container-low)] transition hover:bg-[color:var(--stitch-primary-container)] active:scale-95" type="button" @click="closeModal()">
              <span class="material-symbols-outlined">close</span>
            </button>
          </div>

          <div class="min-h-0 flex-1 space-y-md overflow-y-auto pr-1">
            <label class="block">
              <span class="mb-xs block text-sm font-bold text-[color:var(--stitch-primary)]">ชื่อแบรนด์</span>
              <input
                class="w-full rounded-full border-none bg-[color:var(--stitch-surface-container-low)] px-md py-md text-sm focus:ring-2 focus:ring-[color:var(--stitch-primary-container)]"
                type="text"
                maxlength="100"
                x-model="draft.name"
              />
            </label>
            <label class="flex items-center justify-between gap-md rounded-3xl bg-[color:var(--stitch-primary-container)]/40 p-md">
              <span>
                <span class="block text-sm font-bold text-[color:var(--stitch-primary)]">เปิดใช้งาน</span>
                <span class="text-xs text-[color:var(--stitch-on-surface-variant)]">แบรนด์ที่ปิดจะไม่แสดงในตัวเลือกผูกผู้ใช้</span>
              </span>
              <input class="h-6 w-6 rounded-full border-none text-[color:var(--stitch-primary)] focus:ring-[color:var(--stitch-primary-container)]" type="checkbox" x-model="draft.is_active" />
            </label>
          </div>

          <div class="-mx-lg mt-md flex justify-end gap-sm border-t border-[color:var(--stitch-outline-variant)]/20 bg-white px-lg pt-md">
            <button class="rounded-full bg-[color:var(--stitch-surface-container-low)] px-lg py-md text-sm font-bold transition hover:bg-[color:var(--stitch-surface-container)] active:scale-95" type="button" @click="closeModal()">ยกเลิก</button>
            <button
              class="rounded-full bg-[color:var(--stitch-primary)] px-lg py-md text-sm font-bold text-white shadow-lg transition hover:opacity-95 active:scale-95 disabled:opacity-60"
              type="button"
              @click="save()"
              :disabled="saving"
              x-text="saving ? 'กำลังบันทึก...' : 'บันทึก'"
            ></button>
          </div>
        </div>
      </div>
    </div>

    <script>
      function brandManagement() {
        return {
          query: "",
          brands: [],
          modalOpen: false,
          modalMode: "create",
          editingId: null,
          draft: { name: "", is_active: true },
          saving: false,
          toast: { show: false, tone: "ok", message: "" },

          async init() {
            await this.refresh();
          },

          async refresh() {
            try {
              const res = await fetch("/api/backoffice/brands/", { credentials: "include" });
              if (!res.ok) {
                if (res.status === 401) window.location.href = "/login";
                return;
              }
              const data = await res.json();
              this.brands = Array.isArray(data.brands) ? data.brands : [];
            } catch (e) {
              this.showToast("error", "โหลดข้อมูลไม่สำเร็จ");
            }
          },

          filteredBrands() {
            const q = this.query.trim().toLowerCase();
            if (!q) return this.brands;
            return this.brands.filter((b) => String(b.name || "").toLowerCase().includes(q));
          },

          openCreate() {
            this.modalMode = "create";
            this.editingId = null;
            this.draft = { name: "", is_active: true };
            this.modalOpen = true;
          },

          openEdit(brand) {
            this.modalMode = "edit";
            this.editingId = brand.id;
            this.draft = {
              name: brand.name || "",
              is_active: Boolean(brand.is_active),
            };
            this.modalOpen = true;
          },

          closeModal() {
            this.modalOpen = false;
            this.editingId = null;
          },

          async save() {
            const name = String(this.draft.name || "").trim();
            if (!name) {
              this.showToast("error", "กรุณากรอกชื่อแบรนด์");
              return;
            }
            this.saving = true;
            try {
              let res;
              if (this.modalMode === "create") {
                res = await fetch("/api/backoffice/brands/create/", {
                  method: "POST",
                  credentials: "include",
                  headers: { "Content-Type": "application/json" },
                  body: JSON.stringify({
                    name,
                    is_active: Boolean(this.draft.is_active),
                  }),
                });
              } else {
                res = await fetch(`/api/backoffice/brands/${this.editingId}/`, {
                  method: "POST",
                  credentials: "include",
                  headers: { "Content-Type": "application/json" },
                  body: JSON.stringify({
                    name,
                    is_active: Boolean(this.draft.is_active),
                  }),
                });
              }
              const raw = await res.text();
              let parsed = {};
              try {
                parsed = JSON.parse(raw || "{}");
              } catch (_) {
                parsed = {};
              }
              if (!res.ok) {
                const msg = parsed.message || raw.slice(0, 120) || `HTTP ${res.status}`;
                this.showToast("error", msg);
                return;
              }
              this.showToast("ok", "บันทึกเรียบร้อย");
              await this.refresh();
              this.closeModal();
            } catch (e) {
              this.showToast("error", "บันทึกไม่สำเร็จ");
            } finally {
              this.saving = false;
            }
          },

          showToast(tone, message) {
            this.toast = { show: true, tone, message };
            window.clearTimeout(this._toastTimer);
            this._toastTimer = window.setTimeout(() => (this.toast.show = false), 2500);
          },
        };
      }
    </script>
  </body>
</html>
